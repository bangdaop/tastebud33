<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Taste Buds</title>

    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui;
            background: linear-gradient(180deg, #f3f6fb, #e9eef5);
            overflow: hidden
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header img {
            width: 100%;
            border-radius: 14px
        }

        #surveyWrap {
            padding: 8px;
            background: #f3f6fb
        }

        #surveyBar {
            height: 6px;
            background: #d9dee6;
            border-radius: 6px;
            overflow: hidden
        }

        #surveyBarInner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0d3b66, #3fa9f5);
            transition: width 0.4s ease;
        }

        #slides {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth
        }

        .slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center
        }

        .field {
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08)
        }

        label {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            display: block
        }

        .option {
            padding: 14px;
            border-radius: 10px;
            background: #fafbfc;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            font-size: 16px
        }

        .option.selected {
            background: #fff3e0;
            border-color: #ff7a00
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc
        }

        .badge {
            margin-top: 10px;
            font-weight: 700;
            font-size: 16px;
            color: #0d3b66
        }

        .cityList {
            max-height: 260px;
            overflow-y: auto
        }

        #submitBtn {
            margin: 14px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #ff7a00;
            color: white;
            font-size: 16px
        }

        #matrixOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999
        }

        #matrixText {
            color: #00ff66;
            font-family: monospace;
            font-size: 20px
        }

        /* Loading screen */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #f3f6fb, #e9eef5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }

        #loadingScreen h2 {
            color: #0d3b66;
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 700;
        }

        #loadBar {
            width: 280px;
            height: 8px;
            background: #d9dee6;
            border-radius: 999px;
            overflow: hidden;
        }

        #loadBarInner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0d3b66, #3fa9f5);
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loadingScreen p {
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }

        /* Next button for statements */
        .next-btn {
            display: block;
            margin: 28px auto 0;
            padding: 14px 40px;
            background: linear-gradient(90deg, #0d3b66, #3fa9f5);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(13, 59, 102, .25);
            transition: all 0.2s ease;
        }

        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 12px rgba(13, 59, 102, .25);
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="header">
            <img
                src="https://raw.githubusercontent.com/bangdaop/33cimg/9c0a0d694849c5fcc4fde282076fc70f0c46492f/33%20combo.PNG">
        </div>

        <div id="surveyWrap">
            <div id="surveyBar">
                <div id="surveyBarInner"></div>
            </div>
        </div>

        <div id="slides"></div>

        <button id="submitBtn" style="display:none">Finish</button>

    </div>

    <!-- Loading screen with animated bar -->
    <div id="loadingScreen">
        <h2>Preparing your Taste Buds survey...</h2>
        <div id="loadBar">
            <div id="loadBarInner"></div>
        </div>
        <p>Fetching questions from the kitchen...</p>
    </div>

    <div id="matrixOverlay">
        <div id="matrixText"></div>
    </div>

    <script>
        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzxp6xJwgKTXCO5jas3mg7fD3fBbH5-0MHPkYD3K55LNN2Z7Yli88cvWKv17OcxpvSU/exec"

        let sessionId = localStorage.getItem("tb_session") || ("s_" + Math.random().toString(36).slice(2))
        localStorage.setItem("tb_session", sessionId)

        const answers = {}
        let config = []

        const ageMap = {
            "Below 18 👶": "Congrats! Snack Squad",
            "18–23👩‍🎓": "Campus Cravers",
            "24–28🕺": "Hustle Bites",
            "29–35🧑‍💻": "Weekend Foodies",
            "35–45🧑‍🍼": "Comfort Connoisseurs",
            "46+🧛‍♂️": "Forever Young"
        }

        const cityMap = { Hyderabad: "Telangana", Mumbai: "Maharashtra", Delhi: "Delhi", Bengaluru: "Karnataka" }

        const qs = x => document.querySelector(x)

        function autosave(k, v) {
            fetch(WEBAPP_URL, { method: "POST", body: JSON.stringify({ sessionId, fieldName: k, fieldValue: v }) })
        }

        function updateProgress() {
            const req = config.filter(f => f.type !== "statement")
            let d = 0
            req.forEach(f => answers[f.key] && d++)
            qs("#surveyBarInner").style.width = Math.round(d / req.length * 100) + "%"
            if (d === req.length) qs("#submitBtn").style.display = "block"
        }

        function next(i) {
            document.querySelectorAll(".slide")[i + 1]?.scrollIntoView({ behavior: "smooth" })
        }

        // Fetch config + loading bar animation
        fetch(WEBAPP_URL).then(r => r.json()).then(j => {
            config = j.config.filter(x => x.key || x.type === "statement")

            // Fake loading progress (starts after data received, feels smooth)
            let loadProgress = 0
            const loadInterval = setInterval(() => {
                loadProgress = Math.min(loadProgress + Math.floor(Math.random() * 18) + 7, 97)
                qs("#loadBarInner").style.width = loadProgress + "%"
            }, 110)

            build()

            // Finish loading animation
            setTimeout(() => {
                clearInterval(loadInterval)
                qs("#loadBarInner").style.width = "100%"
                setTimeout(() => {
                    qs("#loadingScreen").style.opacity = "0"
                    setTimeout(() => {
                        qs("#loadingScreen").style.display = "none"
                        updateProgress()
                    }, 600)
                }, 450)
            }, 950)
        })

        function build() {
            const wrap = qs("#slides")
            wrap.innerHTML = "" // clear in case of rebuild

            config.forEach((f, idx) => {
                const slide = document.createElement("div")
                slide.className = "slide"
                const box = document.createElement("div")
                box.className = "field"

                if (f.type === "statement") {
                    box.innerHTML = `<label>${f.label}</label>`

                    const nextBtn = document.createElement("button")
                    nextBtn.className = "next-btn"
                    nextBtn.innerText = "Continue →"
                    nextBtn.onclick = () => next(idx)
                    box.appendChild(nextBtn)

                    slide.appendChild(box)
                    wrap.appendChild(slide)
                    return
                }

                box.append(document.createElement("label")).innerText = f.label

                if (f.type === "select") {
                    const list = document.createElement("div")
                    list.className = f.key.toLowerCase().includes("city") ? "cityList" : ""

                    f.options.split(/;|,/).forEach(o => {
                        const d = document.createElement("div")
                        d.className = "option"
                        d.innerText = o.trim()
                        d.onclick = () => {
                            list.querySelectorAll(".option").forEach(x => x.classList.remove("selected"))
                            d.classList.add("selected")
                            answers[f.key] = d.innerText
                            autosave(f.key, d.innerText)

                            // Remove old badge
                            box.querySelectorAll(".badge").forEach(b => b.remove())

                            // Add new badge for city / age
                            if (f.key.toLowerCase().includes("city")) {
                                box.append(Object.assign(document.createElement("div"), {
                                    className: "badge",
                                    innerText: "📍 " + (cityMap[d.innerText] || "")
                                }))
                            }
                            if (f.key.toLowerCase().includes("age")) {
                                box.append(Object.assign(document.createElement("div"), {
                                    className: "badge",
                                    innerText: ageMap[d.innerText] || ""
                                }))
                            }

                            updateProgress()
                            setTimeout(() => next(idx), 280)
                        }
                        list.append(d)
                    })
                    box.append(list)
                } else {
                    const i = document.createElement("input")
                    i.type = f.type || "text"
                    i.onkeydown = e => {
                        if (e.key === "Enter" && i.value.trim()) {
                            answers[f.key] = i.value.trim()
                            autosave(f.key, i.value.trim())
                            updateProgress()
                            next(idx)
                        }
                    }
                    box.append(i)
                }

                slide.append(box)
                wrap.append(slide)
            })
        }

        qs("#submitBtn").onclick = async () => {
            const o = qs("#matrixOverlay")
            const t = qs("#matrixText")
            o.style.display = "flex"
            const msg = "Submitting your choices to Head Chef CEO Elong Mask . . ."
            let i = 0; t.textContent = ""
            const typer = setInterval(() => {
                t.textContent += msg[i++] || "";
                if (i > msg.length) clearInterval(typer)
            }, 40)

            await fetch(WEBAPP_URL, {
                method: "POST",
                body: JSON.stringify({ sessionId, submitted: true, answers })
            })

            document.body.innerHTML = "<h2 style='text-align:center;margin-top:40vh;color:#0d3b66;font-size:28px;'>Thank you guys!! See ya soon with Smoky Flavours 🎉❤️‍🔥</h2>"
        }
    </script>
</body>

</html>
